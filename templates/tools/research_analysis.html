<!-- 调研分析工具 - 通用组件版本 -->
<div class="container">
    <div class="tool-header">
        <h2><i class="fas fa-chart-pie"></i> 调研分析</h2>
        <p>上传Excel文件进行数据分析和处理</p>
    </div>
    
    <div class="main-layout">
        <!-- 左侧：文件上传区域 -->
        <div class="left-section">
            <div id="research-file-upload-container"></div>
        </div>
        
        <!-- 右侧：分析设置 -->
        <div class="right-section">
            <div class="analysis-section">
                <h3><i class="fas fa-sliders-h"></i> 分析设置</h3>
                
                <div class="form-group">
                    <label class="form-label">分析类型</label>
                    <select id="analysis-type" class="form-control">
                        <option value="basic">基础统计</option>
                        <option value="correlation">相关性分析</option>
                        <option value="trend">趋势分析</option>
                        <option value="comparison">对比分析</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">输出格式</label>
                    <select id="output-format" class="form-control">
                        <option value="excel">Excel报告</option>
                        <option value="pdf">PDF报告</option>
                        <option value="json">JSON数据</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">分析备注 (可选)</label>
                    <textarea id="analysis-notes" class="form-control" rows="3" 
                              placeholder="请输入分析备注或说明..."></textarea>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部操作按钮 -->
    <div class="bottom-actions">
        <button type="button" id="analyze-btn" class="btn btn-primary" disabled>
            <i class="fas fa-chart-bar"></i>
            开始分析
        </button>
        <button type="button" id="reset-btn" class="btn btn-secondary">
            <i class="fas fa-refresh"></i>
            重置
        </button>
    </div>
    
    <!-- 进度显示 -->
    <div class="progress-section" id="progress-section" style="display: none;">
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">准备分析...</div>
    </div>
    
    <!-- 结果显示 -->
    <div class="result-section" id="result-section" style="display: none;">
        <div class="result-content">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h4>分析完成</h4>
            <div class="result-details">
                <span>原文件名: <span id="original-filename">-</span></span>
                <span>分析结果: <span id="analysis-status">已完成</span></span>
            </div>
            <div class="result-actions">
                <button type="button" id="download-btn" class="btn btn-primary">
                    <i class="fas fa-download"></i>
                    下载报告
                </button>
                <button type="button" id="view-details-btn" class="btn btn-info">
                    <i class="fas fa-eye"></i>
                    查看详情
                </button>
                <button type="button" id="cleanup-btn" class="btn btn-tertiary">
                    <i class="fas fa-trash"></i>
                    清理文件
                </button>
            </div>
        </div>
    </div>
    
    <!-- 错误显示 -->
    <div class="error-section" id="error-section" style="display: none;">
        <div class="error-content">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h4>分析失败</h4>
            <p id="error-message">-</p>
            <button type="button" id="retry-btn" class="btn btn-primary">
                <i class="fas fa-redo"></i>
                重新分析
            </button>
        </div>
    </div>
</div>

<script>
// 调研分析页面脚本 - 使用通用组件版本
(function() {
    let uploadComponent = null;
    let selectedFile = null;
    let analysisResult = null;

    // 等待页面加载完成
    function waitForElements(callback, timeout = 5000) {
        const start = Date.now();
        function check() {
            if (typeof FileUploadComponent !== 'undefined') {
                callback();
                return;
            }
            
            if (Date.now() - start > timeout) {
                console.error('等待组件加载超时');
                return;
            }
            
            setTimeout(check, 100);
        }
        check();
    }
    
    // 初始化页面
    function initPage() {
        // 初始化通用上传组件 - 针对Excel文件
        uploadComponent = initFileUpload('research-file-upload-container', {
            accept: '.xlsx,.xls',
            maxSize: 10, // Excel文件通常不会太大
            multiple: false,
            title: 'Excel文件上传',
            description: '拖拽Excel文件到这里或点击选择',
            icon: 'fas fa-file-excel',
            buttonText: '选择Excel文件',
            onFileSelect: handleFileSelect,
            onUpload: handleFileUpload
        });

        // 绑定事件
        bindEvents();
    }

    function handleFileSelect(files) {
        selectedFile = files[0] || null;
        
        // 启用或禁用分析按钮
        const analyzeBtn = document.getElementById('analyze-btn');
        analyzeBtn.disabled = !selectedFile;
        
        // 隐藏其他区域
        hideAllSections();
    }

    function handleFileUpload(files) {
        // 这里可以处理文件上传逻辑
        return new Promise((resolve, reject) => {
            // 模拟上传过程
            setTimeout(() => {
                if (Math.random() > 0.1) {
                    resolve({ success: true, filename: 'uploaded_' + files[0].name });
                } else {
                    reject(new Error('上传失败'));
                }
            }, 1000);
        });
    }

    function bindEvents() {
        const analyzeBtn = document.getElementById('analyze-btn');
        const resetBtn = document.getElementById('reset-btn');

        // 分析按钮
        analyzeBtn.addEventListener('click', function() {
            if (selectedFile) {
                startAnalysis();
            }
        });

        // 重置按钮
        resetBtn.addEventListener('click', function() {
            resetForm();
        });
        
        // 下载按钮
        document.addEventListener('click', function(e) {
            if (e.target.id === 'download-btn' && analysisResult) {
                downloadResult(analysisResult.filename);
            }
        });

        // 查看详情按钮
        document.addEventListener('click', function(e) {
            if (e.target.id === 'view-details-btn') {
                viewDetails();
            }
        });

        // 清理文件按钮
        document.addEventListener('click', function(e) {
            if (e.target.id === 'cleanup-btn') {
                cleanupTempFiles();
            }
        });

        // 重试按钮
        document.addEventListener('click', function(e) {
            if (e.target.id === 'retry-btn') {
                hideErrorSection();
                if (selectedFile) {
                    startAnalysis();
                }
            }
        });
    }

    async function startAnalysis() {
        showProgress('正在分析数据...');
        const analyzeBtn = document.getElementById('analyze-btn');
        analyzeBtn.disabled = true;
        
        // 构建表单数据
        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('analysis_type', document.getElementById('analysis-type').value);
        formData.append('output_format', document.getElementById('output-format').value);
        formData.append('notes', document.getElementById('analysis-notes').value);
        
        // 模拟分析进度步骤
        const progressSteps = [
            { percent: 20, text: '解析Excel数据...' },
            { percent: 40, text: '进行数据分析...' },
            { percent: 60, text: '生成图表...' },
            { percent: 80, text: '编译报告...' },
            { percent: 100, text: '分析完成!' }
        ];
        
        // 逐步更新进度
        for (const step of progressSteps) {
            await new Promise(resolve => setTimeout(resolve, 800));
            updateProgress(step.percent, step.text);
        }
        
        try {
            // 调用真实的API接口
            const response = await fetch('/toolset/research-analysis/upload', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            
            if (result.success) {
                analysisResult = result;
                showResult(result);
            } else {
                showError(result.message || '分析失败');
            }
        } catch (error) {
            console.error('Analysis error:', error);
            showError('网络错误: ' + error.message);
        } finally {
            analyzeBtn.disabled = false;
            hideProgress();
        }
    }
    
    function showProgress(message) {
        const progressSection = document.getElementById('progress-section');
        const progressText = document.getElementById('progress-text');
        const progressFill = document.getElementById('progress-fill');
        
        progressSection.style.display = 'block';
        progressText.textContent = message;
        progressFill.style.width = '0%';
    }

    function updateProgress(percent, text) {
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        
        progressFill.style.width = percent + '%';
        progressText.textContent = text;
    }

    function hideProgress() {
        const progressSection = document.getElementById('progress-section');
        const progressFill = document.getElementById('progress-fill');
        
        progressSection.style.display = 'none';
        progressFill.style.width = '0%';
    }

    function showResult(data) {
        document.getElementById('original-filename').textContent = data.original_filename || '-';
        document.getElementById('analysis-status').textContent = '已完成';
        
        const resultSection = document.getElementById('result-section');
        resultSection.style.display = 'block';
        resultSection.scrollIntoView({ behavior: 'smooth' });
    }

    function showError(message) {
        document.getElementById('error-message').textContent = message;
        
        const errorSection = document.getElementById('error-section');
        errorSection.style.display = 'block';
        errorSection.scrollIntoView({ behavior: 'smooth' });
    }

    function hideErrorSection() {
        const errorSection = document.getElementById('error-section');
        errorSection.style.display = 'none';
    }

    function hideAllSections() {
        const progressSection = document.getElementById('progress-section');
        const resultSection = document.getElementById('result-section');
        const errorSection = document.getElementById('error-section');
        
        progressSection.style.display = 'none';
        resultSection.style.display = 'none';
        errorSection.style.display = 'none';
    }

    function resetForm() {
        selectedFile = null;
        analysisResult = null;
        
        // 清除上传组件中的文件
        if (uploadComponent) {
            uploadComponent.clearFiles();
        }
        
        // 清除表单
        document.getElementById('analysis-type').value = 'basic';
        document.getElementById('output-format').value = 'excel';
        document.getElementById('analysis-notes').value = '';
        
        // 禁用分析按钮
        document.getElementById('analyze-btn').disabled = true;
        
        hideAllSections();
    }

    function downloadResult(filename) {
        // 创建下载链接
        const link = document.createElement('a');
        link.href = `/toolset/research-analysis/download/${filename}`;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        alert('开始下载分析报告');
    }

    function viewDetails() {
        alert('详情查看功能开发中...');
    }

    async function cleanupTempFiles() {
        try {
            const response = await fetch('/toolset/research-analysis/cleanup', {
                method: 'POST'
            });

            const result = await response.json();

            if (result.success) {
                alert(result.message);
            } else {
                alert(result.message);
            }
        } catch (error) {
            console.error('Cleanup error:', error);
            alert('清理临时文件失败');
        }
    }

    // 等待组件加载完成后初始化
    waitForElements(initPage);
})();
</script>
