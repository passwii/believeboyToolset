<!-- 产品标签处理工具 - 简化组件版本 -->
<div class="container">
    <div class="tool-header">
        <h2><i class="fas fa-tags"></i> 产品标签处理</h2>
        <p>批量处理PDF产品标签，替换指定文字内容</p>
    </div>
    
    <!-- 引入简化文件上传组件样式 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/simple-file-upload.css') }}">
    
    <!-- 引入简化文件上传组件 -->
    <script src="{{ url_for('static', filename='js/components/simple-file-upload.js') }}"></script>
    
    <div class="main-layout">
        <!-- 左侧：文件上传区域 -->
        <div class="left-section">
            <div id="simple-file-upload-container"></div>
        </div>
        
        <!-- 右侧：处理设置 -->
        <div class="right-section">
            <div class="replacement-section">
                <h3><i class="fas fa-cogs"></i> 处理设置</h3>
                
                <div class="form-group">
                    <label class="form-label">文字替换规则</label>
                    <div class="replacement-display">
                        <div class="replacement-item">
                            <span class="replace-from">新品</span>
                            <i class="fas fa-arrow-right"></i>
                            <span class="replace-to">NEW</span>
                        </div>
                    </div>
                    <small class="form-hint">系统已预置"新品" → "NEW"的替换规则</small>
                </div>
                
                <div class="settings-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="case-sensitive" checked>
                        <span class="checkmark"></span>
                        区分大小写
                    </label>
                    
                    <label class="checkbox-label">
                        <input type="checkbox" id="whole-word" checked>
                        <span class="checkmark"></span>
                        完整单词匹配
                    </label>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部操作按钮 -->
    <div class="bottom-actions">
        <button type="button" id="process-btn" class="btn btn-primary" disabled>
            <i class="fas fa-cogs"></i>
            开始处理
        </button>
        <button type="button" id="clear-btn" class="btn btn-secondary">
            <i class="fas fa-trash"></i>
            清除
        </button>
    </div>
    
    <!-- 进度显示 -->
    <div class="progress-section" id="progress-section" style="display: none;">
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">处理中...</div>
    </div>
    
    <!-- 结果显示 -->
    <div class="result-section" id="result-section" style="display: none;">
        <div class="result-content">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h4>处理完成</h4>
            <div class="result-details">
                <span>原文件名: <span id="original-filename">-</span></span>
                <span>替换次数: <span id="replacement-count">0</span></span>
            </div>
            <button type="button" id="download-btn" class="btn btn-primary">
                <i class="fas fa-download"></i>
                下载文件
            </button>
        </div>
    </div>
    
    <!-- 错误显示 -->
    <div class="error-section" id="error-section" style="display: none;">
        <div class="error-content">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h4>处理失败</h4>
            <p id="error-message">-</p>
            <button type="button" id="retry-btn" class="btn btn-primary">
                <i class="fas fa-redo"></i>
                重新处理
            </button>
        </div>
    </div>
</div>

<script>
// 产品标签处理脚本 - 使用简化组件版本
(function() {
    let uploadComponent = null;
    let selectedFile = null;
    let processedResult = null;

    // 初始化页面
    function initPage() {
        // 初始化简化上传组件
        uploadComponent = initSimpleFileUpload('simple-file-upload-container', {
            accept: '.pdf',
            maxSize: 20, // PDF文件通常较大
            multiple: false,
            title: 'PDF文件上传',
            description: '拖拽产品标签PDF文件到这里或点击选择',
            icon: 'fas fa-file-pdf',
            buttonText: '选择PDF文件',
            onFileSelect: handleFileSelect,
            onUpload: handleFileUpload
        });

        // 绑定事件
        bindEvents();
    }

    function handleFileSelect(files) {
        selectedFile = files[0] || null;
        
        // 启用或禁用处理按钮
        const processBtn = document.getElementById('process-btn');
        processBtn.disabled = !selectedFile;
        
        // 隐藏其他区域
        hideAllSections();
    }

    function handleFileUpload(files) {
        // 这里可以处理文件上传逻辑
        return new Promise((resolve, reject) => {
            // 模拟上传过程
            setTimeout(() => {
                if (Math.random() > 0.1) {
                    resolve({ success: true, filename: 'uploaded_' + files[0].name });
                } else {
                    reject(new Error('上传失败'));
                }
            }, 1000);
        });
    }

    function bindEvents() {
        const processBtn = document.getElementById('process-btn');
        const clearBtn = document.getElementById('clear-btn');

        // 处理按钮
        processBtn.addEventListener('click', function() {
            if (selectedFile) {
                processPDF();
            }
        });

        // 清除按钮
        clearBtn.addEventListener('click', function() {
            clearAll();
        });
        
        // 下载按钮
        document.addEventListener('click', function(e) {
            if (e.target.id === 'download-btn' && processedResult) {
                downloadFile(processedResult.filename);
            }
        });

        // 重试按钮
        document.addEventListener('click', function(e) {
            if (e.target.id === 'retry-btn') {
                hideErrorSection();
                if (selectedFile) {
                    processPDF();
                }
            }
        });
    }

    function processPDF() {
        showProgress('正在处理PDF文件...');
        const processBtn = document.getElementById('process-btn');
        processBtn.disabled = true;
        
        // 构建表单数据
        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('case_sensitive', document.getElementById('case-sensitive').checked);
        formData.append('whole_word', document.getElementById('whole-word').checked);
        
        // 调用真实的API接口
        fetch('/toolset/product-label/process', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                processedResult = data;
                showResult(data);
            } else {
                showError(data.message || '处理失败');
            }
        })
        .catch(error => {
            showError('网络错误: ' + error.message);
        })
        .finally(() => {
            processBtn.disabled = false;
            hideProgress();
        });
    }
    
    function showProgress(message) {
        const progressSection = document.getElementById('progress-section');
        const progressText = document.getElementById('progress-text');
        const progressFill = document.getElementById('progress-fill');
        
        progressSection.style.display = 'block';
        progressText.textContent = message;
        
        // 进度条动画
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 30;
            if (progress > 90) progress = 90;
            progressFill.style.width = progress + '%';
        }, 200);
    }

    function hideProgress() {
        const progressSection = document.getElementById('progress-section');
        const progressFill = document.getElementById('progress-fill');
        
        progressSection.style.display = 'none';
        progressFill.style.width = '0%';
    }

    function showResult(data) {
        document.getElementById('original-filename').textContent = data.original_filename || '-';
        document.getElementById('replacement-count').textContent = data.replacement_count || '0';
        
        const resultSection = document.getElementById('result-section');
        resultSection.style.display = 'block';
        resultSection.scrollIntoView({ behavior: 'smooth' });
    }

    function showError(message) {
        document.getElementById('error-message').textContent = message;
        
        const errorSection = document.getElementById('error-section');
        errorSection.style.display = 'block';
        errorSection.scrollIntoView({ behavior: 'smooth' });
    }

    function hideErrorSection() {
        const errorSection = document.getElementById('error-section');
        errorSection.style.display = 'none';
    }

    function hideAllSections() {
        const progressSection = document.getElementById('progress-section');
        const resultSection = document.getElementById('result-section');
        const errorSection = document.getElementById('error-section');
        
        progressSection.style.display = 'none';
        resultSection.style.display = 'none';
        errorSection.style.display = 'none';
    }

    function clearAll() {
        selectedFile = null;
        processedResult = null;
        
        // 清除上传组件中的文件
        if (uploadComponent) {
            uploadComponent.clearFiles();
        }
        
        // 清除表单
        document.getElementById('case-sensitive').checked = true;
        document.getElementById('whole-word').checked = true;
        
        // 禁用处理按钮
        document.getElementById('process-btn').disabled = true;
        
        hideAllSections();
    }

    function downloadFile(filename) {
        window.open(`/toolset/product-label/download/${filename}`, '_blank');
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', initPage);
})();
</script>
